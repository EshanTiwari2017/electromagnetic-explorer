<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM Spectrum Explorer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const [inputValue, setInputValue] = useState(555);
            const [unit, setUnit] = useState('nm');

            const units = {
                pm: 1e-12, nm: 1e-9, µm: 1e-6, mm: 1e-3, cm: 1e-2, m: 1, km: 1e3,
            };

            const wavelengthInMeters = useMemo(() => {
                const val = parseFloat(inputValue);
                if (isNaN(val)) return 0;
                return val * units[unit];
            }, [inputValue, unit]);

            const categories = [
                { id: 'gamma', name: 'Gamma', min: 0, max: 10e-12, color: 'bg-indigo-900', text: 'text-white', desc: 'Medicine' },
                { id: 'xray', name: 'X-rays', min: 10e-12, max: 10e-9, color: 'bg-blue-800', text: 'text-white', desc: 'Imaging' },
                { id: 'uv', name: 'Ultraviolet', min: 10e-9, max: 400e-9, color: 'bg-purple-600', text: 'text-white', desc: 'Sunlight' },
                { id: 'visible', name: 'Visible', min: 400e-9, max: 750e-9, color: 'bg-gradient-to-r from-violet-500 via-green-400 to-red-500', text: 'text-black font-bold', desc: 'Vision' },
                { id: 'ir', name: 'Infrared', min: 750e-9, max: 1e-3, color: 'bg-red-800', text: 'text-white', desc: 'Heat' },
                { id: 'micro', name: 'Microwaves', min: 1e-3, max: 1, color: 'bg-orange-600', text: 'text-white', desc: 'Wi-Fi' },
                { id: 'radio', name: 'Radio', min: 1, max: Infinity, color: 'bg-gray-700', text: 'text-white', desc: 'Signals' },
            ];

            const currentCategory = categories.find(c => wavelengthInMeters >= c.min && wavelengthInMeters < c.max) || categories[categories.length - 1];

            const getMarkerPosition = (val) => {
                const segmentWidth = 100 / categories.length;
                const catIndex = categories.findIndex(c => val >= c.min && val < c.max);
                const index = catIndex === -1 ? categories.length - 1 : catIndex;
                const cat = categories[index];
                let internalPercent = 0;
                if (cat.max === Infinity) {
                    internalPercent = Math.min((val - cat.min) / 10, 1);
                } else {
                    const logMin = Math.log10(cat.min === 0 ? 1e-15 : cat.min);
                    const logMax = Math.log10(cat.max);
                    const logVal = Math.log10(val === 0 ? 1e-15 : val);
                    internalPercent = (logVal - logMin) / (logMax - logMin);
                }
                return (index * segmentWidth) + (internalPercent * segmentWidth);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 sm:p-8 font-sans text-slate-800">
                    <div className="max-w-4xl mx-auto space-y-8">
                        <header className="text-center space-y-2">
                            <h1 className="text-2xl sm:text-3xl font-bold text-slate-900">EM Spectrum Explorer</h1>
                            <p className="text-slate-500 italic text-sm sm:text-base">Hi friends! This tool will find the type of EM wave.</p>
                        </header>

                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Wavelength Value</label>
                                    <input type="number" value={inputValue} onChange={(e) => setInputValue(e.target.value)} className="w-full px-4 py-2 rounded-lg border border-slate-300 text-base outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Unit</label>
                                    <select value={unit} onChange={(e) => setUnit(e.target.value)} className="w-full px-4 py-2 rounded-lg border border-slate-300 bg-white text-base cursor-pointer outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="pm">Picometers (pm)</option>
                                        <option value="nm">Nanometers (nm)</option>
                                        <option value="µm">Micrometers (µm)</option>
                                        <option value="mm">Millimeters (mm)</option>
                                        <option value="m">Meters (m)</option>
                                    </select>
                                </div>
                            </div>

                            <div className="mt-6 flex flex-col sm:flex-row gap-4 items-center justify-between p-4 bg-slate-100 rounded-xl border border-slate-200">
                                <div className="text-center sm:text-left">
                                    <span className="text-[10px] text-slate-400 block uppercase font-black">Classification</span>
                                    <span className="text-xl font-bold text-blue-600">{currentCategory.name}</span>
                                </div>
                                <div className="text-center sm:text-right">
                                    <span className="text-[10px] text-slate-400 block uppercase font-black">Base Meters</span>
                                    <span className="text-lg font-mono text-slate-600">{wavelengthInMeters.toExponential(2)} m</span>
                                </div>
                            </div>
                        </section>

                        <section className="space-y-4">
                            <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Full Spectrum Range</h2>
                            <div className="relative h-12 sm:h-14 bg-slate-200 rounded-xl overflow-hidden flex border-2 border-white shadow-sm">
                                {categories.map((cat) => (
                                    <div key={cat.id} className={`${cat.color} h-full flex items-center justify-center relative`} style={{ width: `${100 / categories.length}%` }}>
                                        <span className={`text-[7px] sm:text-[9px] font-bold uppercase ${cat.text}`}>{cat.name}</span>
                                    </div>
                                ))}
                                <div className="absolute top-0 bottom-0 w-1 bg-white shadow-lg z-10 transition-all duration-500" style={{ left: `${getMarkerPosition(wavelengthInMeters)}%` }}>
                                    <div className="absolute -top-1 left-1/2 -translate-x-1/2 w-4 h-4 bg-white rotate-45 border-2 border-slate-800"></div>
                                </div>
                            </div>
                        </section>

                        <footer className="pt-8 border-t border-slate-200 grid grid-cols-1 sm:grid-cols-3 gap-8">
                            <div>
                                <h3 className="text-sm font-bold text-slate-700 mb-2">The Spectrum</h3>
                                <p className="text-xs text-slate-500 leading-relaxed">Includes all types of electromagnetic radiation, from huge radio waves to tiny gamma rays.</p>
                            </div>
                            <div>
                                <h3 className="text-sm font-bold text-slate-700 mb-2">Energy</h3>
                                <p className="text-xs text-slate-500 leading-relaxed">Shorter wavelengths have higher energy. This allows X-rays to pass through solid objects.</p>
                            </div>
                            <div>
                                <h3 className="text-sm font-bold text-slate-700 mb-2">Visible Light</h3>
                                <p className="text-xs text-slate-500 leading-relaxed">A tiny portion of the spectrum. Humans only see between 400 and 750 nanometers.</p>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
